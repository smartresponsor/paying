version: '3.8'
services:
  app:
    image: php:8.4-cli
    working_dir: /app
    volumes:
      - .:/app
      - payment_infra:/app/var
    command: php -S 0.0.0.0:8000 -t public
    ports:
      - '8000:8000'
  pg:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: app
      POSTGRES_USER: app
      POSTGRES_DB: payment
    ports:
      - '5432:5432'
volumes:
  payment_infra:
