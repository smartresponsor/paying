groups:
  - name: payment-slo
    rules:
      - alert: PaymentErrorBudgetBurn
        expr: payment_failure_total > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: "Payment errors detected"
  - alert: PaymentProjectionLagHigh
    expr: payment_projection_lag_ms > 5000
    for: 5m
    labels: { severity: warning }
    annotations:
      summary: "Payment projection lag is high"
