groups:
  - name: payment-alerts
    rules:
      - alert: HighFailedPayments
        expr: payment_failed_total > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High number of failed payments"

      - alert: HighProjectionLag
        expr: payment_projection_lag_ms > 60000
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Projection lag is too high"
