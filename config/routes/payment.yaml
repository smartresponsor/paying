payment_console:
  path: /payment/console
  controller: App\Controller\Payment\PaymentConsoleController::console
  methods: [GET]

payment_console_create:
  path: /payment/console/create
  controller: App\Controller\Payment\PaymentConsoleController::create
  methods: [POST]

payment_console_start:
  path: /payment/console/start
  controller: App\Controller\Payment\PaymentConsoleController::start
  methods: [POST]

payment_console_finalize:
  path: /payment/console/finalize
  controller: App\Controller\Payment\PaymentConsoleController::finalize
  methods: [POST]

payment_console_refund:
  path: /payment/console/refund
  controller: App\Controller\Payment\PaymentConsoleController::refund
  methods: [POST]

payment_create:
  path: /api/payments
  controller: App\Controller\Payment\PaymentCreateController::create
  methods: [POST]

payment_read:
  path: /api/payments/{id}
  controller: App\Controller\Payment\PaymentReadController::read
  methods: [GET]

payment_refund:
  path: /api/payments/{id}/refund
  controller: App\Controller\Payment\PaymentRefundController::refund
  methods: [POST]

payment_start:
  path: /payment/start
  controller: App\Controller\Payment\StartController::start
  methods: [POST]

payment_finalize:
  path: /payment/finalize/{id}
  controller: App\Controller\Payment\FinalizeController::finalize
  methods: [POST]

payment_webhook:
  path: /payment/webhook/{provider}
  controller: App\Controller\Payment\WebhookController::webhook
  methods: [POST]

payment_metrics:
  path: /metrics
  controller: App\Controller\Payment\MetricController::metrics
  methods: [GET]

payment_dlq_list:
  path: /payment/dlq
  controller: App\Controller\Payment\DlqController::list
  methods: [GET]

payment_dlq_replay:
  path: /payment/dlq/replay/{id}
  controller: App\Controller\Payment\DlqController::replay
  methods: [POST]

payment_status:
  path: /status
  controller: App\Controller\Payment\StatusController::status
  methods: [GET]
