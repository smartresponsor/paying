
doctrine:
  dbal:
    default_connection: data
    connections:
      data:
        # User data storage; expected to be PostgreSQL.
        url: '%env(resolve:DATABASE_URL)%'
      infra:
        # Application/infrastructure data storage; expected to be SQLite.
        url: '%env(resolve:INFRA_URL)%'
  orm:
    auto_generate_proxy_classes: true
    controller_resolver:
      auto_mapping: true
    entity_managers:
      default:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        connection: data
        mappings:
          App:
            is_bundle: false
            type: attribute
            dir: '%kernel.project_dir%/src/Entity'
            prefix: 'App\Entity'
            alias: App
