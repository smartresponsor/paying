services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/**/Resources/'
            - '../src/**/Tests/'

    App\Repository\Payment\PaymentRepositoryInterface: '@App\Repository\Payment\PaymentRepository'
    App\Infrastructure\Payment\PaymentProjectionRepositoryInterface: '@App\Infrastructure\Payment\PaymentProjectionRepository'
    App\ServiceInterface\Payment\ProviderRouterInterface: '@App\Service\Payment\ProviderRouter'
    App\ServiceInterface\Payment\ProviderGuardInterface: '@App\Service\Payment\ProviderGuard'
    App\ServiceInterface\Payment\PaymentServiceInterface: "@App\Service\Payment\PaymentService"
    App\ServiceInterface\Payment\IdempotencyStoreInterface:
        factory: ['@App\Service\Payment\IdempotencyStoreFactory', 'create']

    App\Service\Payment\ProviderRouter:
        arguments:
            $providers:
                internal: '@App\Service\Payment\InternalPaymentProvider'
                stripe: '@App\Service\Payment\StripePaymentProvider'

    App\Service\Payment\StripePaymentProvider:
        arguments:
            $secretKey: '%env(default::STRIPE_SECRET_KEY)%'
            $webhookSecret: '%env(default::STRIPE_WEBHOOK_SECRET)%'

    App\ServiceInterface\Payment\IdempotencyServiceInterface: '@App\Service\Payment\IdempotencyService'

    App\Service\Payment\IdempotencyService:
        arguments:
            $ttlSec: '%env(int:default:86400:IDEM_TTL)%'

    App\Infrastructure\Payment\PaymentProjectionRepository:
        arguments:
            $infra: '@doctrine.dbal.infra_connection'

    App\Infrastructure\Payment\RateLimitSubscriber:
        arguments:
            $paymentApiLimiter: '@limiter.payment_api'


    App\ServiceInterface\Payment\DlqServiceInterface: '@App\Service\Payment\DlqService'
    App\ServiceInterface\Payment\ProjectionLagServiceInterface: '@App\Service\Payment\ProjectionLagService'
    App\ServiceInterface\Payment\PaymentStartServiceInterface: '@App\Service\Payment\PaymentStartService'
    App\ServiceInterface\Payment\WebhookIngestServiceInterface: '@App\Service\Payment\WebhookIngestService'

    App\ServiceInterface\Payment\WebhookVerifierInterface: '@App\Service\Payment\WebhookVerifier'
    App\ServiceInterface\Payment\TokenVerifierInterface: '@App\Service\Payment\TokenVerifier'

    App\ServiceInterface\Payment\ProjectionSyncInterface: '@App\Service\Payment\ProjectionSync'
    App\ServiceInterface\Payment\RefundServiceInterface: '@App\Service\Payment\RefundService'
    App\ServiceInterface\Payment\ReconciliationServiceInterface: '@App\Service\Payment\ReconciliationService'
    App\Infrastructure\Payment\OutboxPublisherInterface: '@App\Infrastructure\Payment\OutboxPublisher'

    App\Service\Payment\Mapper\StripeEventMapper:
        tags: ['payment.event_mapper']

    App\Service\Payment\Mapper\AdyenEventMapper:
        tags: ['payment.event_mapper']

    App\Controller\Payment\WebhookController:
        arguments:
            $mappers: !tagged_iterator payment.event_mapper

    payment_audit.logger:
        class: Psr\Log\LoggerInterface
        factory: ['@monolog.logger', 'get']
        arguments: ['payment_audit']

    App\Controller\Webhook\StripeWebhookController:
        arguments:
            $paymentAuditLogger: '@payment_audit.logger'

    App\Controller\Webhook\PayPalWebhookController:
        arguments:
            $paymentAuditLogger: '@payment_audit.logger'


    App\ServiceInterface\Payment\Outbox\PaymentOutboxProcessorInterface: '@App\Service\Payment\Outbox\PaymentOutboxProcessor'

    App\Service\Payment\Outbox\PaymentOutboxProcessor:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $transport: '@messenger.transport.payment_outbox'
            $logger: '@logger'

    App\Command\Payment\PaymentOutboxProcessCommand:
        tags: ['console.command']

    App\Message\Handler\Payment\PaymentCreateHandler:
        arguments:
            $gateways: !tagged_iterator payment.gateway
        tags: ['messenger.message_handler']

    App\Message\Handler\Payment\PaymentRefundHandler:
        arguments:
            $gateways: !tagged_iterator payment.gateway
        tags: ['messenger.message_handler']


    App\Service\Payment\Gateway\StripeGateway:
        tags: ['payment.gateway']

    App\Service\Payment\Gateway\PayPalGateway:
        tags: ['payment.gateway']

    App\Service\Order\NullOrderPaymentSync:
        arguments:
            $logger: '@logger'
        autoconfigure: true
        autowire: true

    App\ServiceInterface\Order\OrderPaymentSyncInterface: '@App\Service\Order\NullOrderPaymentSync'

    App\ServiceInterface\Payment\Reconciliation\PaymentReconciliationServiceInterface: '@App\Service\Payment\Reconciliation\PaymentReconciliationService'

    App\Message\Handler\Payment\PaymentEventConsumer:
        autoconfigure: true
        autowire: true
