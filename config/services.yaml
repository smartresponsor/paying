parameters:
    payment.idem_ttl_default: 86400

services:
    _defaults:
        autowire: true
        autoconfigure: true

    _instanceof:
        App\ServiceInterface\EventMapperInterface:
            tags: ['payment.event_mapper']
        App\ServiceInterface\Gateway\PaymentGatewayInterface:
            tags: ['payment.gateway']

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'
            - '../src/**/Resources/'
            - '../src/**/Tests/'

    App\RepositoryInterface\PaymentRepositoryInterface: '@App\Repository\PaymentRepository'
    App\InfrastructureInterface\PaymentProjectionRepositoryInterface: '@App\Infrastructure\PaymentProjectionRepository'
    App\ServiceInterface\ProviderRouterInterface: '@App\Service\ProviderRouter'
    App\ServiceInterface\ProviderGuardInterface: '@App\Service\ProviderGuard'
    App\ServiceInterface\PaymentServiceInterface: '@App\Service\PaymentService'
    App\ServiceInterface\IdempotencyStoreInterface:
        factory: ['@App\Service\IdempotencyStoreFactory', 'create']


    App\Controller\:
        resource: '../src/Controller/'
        public: true
        tags: ['controller.service_arguments']


    App\Service\ProviderRouter:
        arguments:
            $providers:
                internal: '@App\Service\InternalPaymentProvider'
                stripe: '@App\Service\StripePaymentProvider'

    App\Service\StripePaymentProvider:
        arguments:
            $secretKey: '%env(default::STRIPE_SECRET_KEY)%'
            $webhookSecret: '%env(default::STRIPE_WEBHOOK_SECRET)%'

    App\ServiceInterface\IdempotencyServiceInterface: '@App\Service\IdempotencyService'

    App\Service\IdempotencyService:
        arguments:
            $ttlSec: '%env(int:default:payment.idem_ttl_default:IDEM_TTL)%'

    App\Infrastructure\PaymentProjectionRepository:
        arguments:
            $infra: '@doctrine.dbal.infra_connection'

    App\Infrastructure\RateLimitSubscriber:
        arguments:
            $paymentApiLimiter: '@limiter.payment_api'


    App\ServiceInterface\DlqServiceInterface: '@App\Service\DlqService'
    App\ServiceInterface\ProjectionLagServiceInterface: '@App\Service\ProjectionLagService'
    App\ServiceInterface\PaymentStartServiceInterface: '@App\Service\PaymentStartService'
    App\ServiceInterface\PaymentConsoleReadModelInterface: '@App\Service\PaymentConsoleReadModel'
    App\ServiceInterface\PaymentConsoleCreateHandlerInterface: '@App\Service\PaymentConsoleCreateHandler'
    App\ServiceInterface\PaymentConsoleStartHandlerInterface: '@App\Service\PaymentConsoleStartHandler'
    App\ServiceInterface\PaymentConsoleFinalizeHandlerInterface: '@App\Service\PaymentConsoleFinalizeHandler'
    App\ServiceInterface\PaymentConsoleRefundHandlerInterface: '@App\Service\PaymentConsoleRefundHandler'
    App\ServiceInterface\WebhookIngestServiceInterface: '@App\Service\WebhookIngestService'

    App\ServiceInterface\WebhookVerifierInterface: '@App\Service\WebhookVerifier'
    App\ServiceInterface\TokenVerifierInterface: '@App\Service\TokenVerifier'

    App\ServiceInterface\ProjectionSyncInterface: '@App\Service\ProjectionSync'
    App\ServiceInterface\RefundServiceInterface: '@App\Service\RefundService'
    App\ServiceInterface\ReconciliationServiceInterface: '@App\Service\ReconciliationService'
    App\InfrastructureInterface\OutboxPublisherInterface: '@App\Infrastructure\OutboxPublisher'

    App\Controller\WebhookController:
        public: true
        tags: ['controller.service_arguments']
        arguments:
            $mappers: !tagged_iterator payment.event_mapper

    payment_audit.logger:
        alias: monolog.logger.payment_audit

    App\Controller\Webhook\StripeWebhookController:
        public: true
        tags: ['controller.service_arguments']
        arguments:
            $paymentAuditLogger: '@payment_audit.logger'

    App\Controller\Webhook\PayPalWebhookController:
        public: true
        tags: ['controller.service_arguments']
        arguments:
            $paymentAuditLogger: '@payment_audit.logger'


    App\ServiceInterface\Outbox\PaymentOutboxProcessorInterface: '@App\Service\Outbox\PaymentOutboxProcessor'

    App\Service\Outbox\PaymentOutboxProcessor:
        arguments:
            $em: '@doctrine.orm.entity_manager'
            $transport: '@messenger.transport.payment_outbox'
            $logger: '@logger'

    App\Message\Handler\PaymentCreateHandler:
        arguments:
            $gateways: !tagged_iterator payment.gateway

    App\Message\Handler\PaymentRefundHandler:
        arguments:
            $gateways: !tagged_iterator payment.gateway

    App\Service\Order\NullOrderPaymentSync:
        arguments:
            $logger: '@logger'
        autoconfigure: true
        autowire: true

    App\ServiceInterface\Order\OrderPaymentSyncInterface: '@App\Service\Order\NullOrderPaymentSync'

    App\ServiceInterface\Reconciliation\PaymentReconciliationServiceInterface: '@App\Service\Reconciliation\PaymentReconciliationService'
